            { question: "哪种鸟类的眼睛比大脑还大？", options: ["猫头鹰", "鸵鸟", "老鹰", "鸽子"], correct: 1, explanation: "鸵鸟的眼睛比它的大脑还大。" },
            { question: "壁虎的脚靠什么原理爬墙？", options: ["吸盘", "粘液", "范德华力", "静电"], correct: 2, explanation: "壁虎脚上有数百万根刚毛，利用范德华力吸附在墙上。" },

            { question: "水獭睡觉时会做什么来防止被冲散？", options: ["用石头压住", "手拉手", "缠住水草", "游到岸边"], correct: 1, explanation: "水獭会手拉手睡觉，防止被水流冲散。" },
            { question: "哪种鲨鱼是最大的鱼类？", options: ["大白鲨", "虎鲨", "鲸鲨", "锤头鲨"], correct: 2, explanation: "鲸鲨是最大的鱼类，体长可达12米以上。" },
            { question: "小丑鱼可以做什么？", options: ["改变颜色", "改变性别", "发光", "放电"], correct: 1, explanation: "小丑鱼可以改变性别，雌性死亡后最大的雄性会变成雌性。" },
            { question: "哪种蜘蛛会织出最大的网？", options: ["黑寡妇", "狼蛛", "达尔文树皮蜘蛛", "捕鸟蛛"], correct: 2, explanation: "达尔文树皮蜘蛛能织出直径25米的巨型蜘蛛网。" },
            { question: "蚂蚁能举起自己体重多少倍的物体？", options: ["10倍", "20倍", "50倍", "100倍"], correct: 2, explanation: "蚂蚁可以举起自己体重50倍的物体。" },
            { question: "哪种蛇是世界上最长的？", options: ["眼镜王蛇", "森蚺", "网纹蟒", "缅甸蟒"], correct: 2, explanation: "网纹蟒是世界上最长的蛇，可达10米以上。" },
            { question: "蜂鸟每分钟心跳多少次？", options: ["200次", "500次", "1200次", "2000次"], correct: 2, explanation: "蜂鸟的心跳每分钟可达1200次，是动物中最快的之一。" },
            { question: "哪种动物会跳8字舞？", options: ["蚂蚁", "蜜蜂", "蝴蝶", "蜻蜓"], correct: 1, explanation: "蜜蜂通过8字舞告诉同伴蜜源的方向和距离。" },
            { question: "科莫多巨蜥的唾液有什么特点？", options: ["有剧毒", "有大量细菌", "有麻痹作用", "有消化酶"], correct: 1, explanation: "科莫多巨蜥的唾液含有50多种细菌，猎物被咬后24小时内会死亡。" },
            { question: "哪种动物可以再生四肢和心脏？", options: ["壁虎", "蝾螈", "海星", "螃蟹"], correct: 1, explanation: "蝾螈可以再生四肢、尾巴、甚至部分心脏和大脑。" },
            { question: "老虎的皮肤是什么样子的？", options: ["纯色", "也是条纹状", "斑点状", "网状"], correct: 1, explanation: "老虎的皮肤也是条纹状的，每只老虎的条纹都独一无二。" },
            { question: "哪种鲸鱼会唱歌？", options: ["蓝鲸", "座头鲸", "虎鲸", "抹香鲸"], correct: 1, explanation: "座头鲸以其复杂的歌声闻名，可以传播数千公里。" },
            { question: "哪种鸟能倒着飞？", options: ["老鹰", "蜂鸟", "燕子", "麻雀"], correct: 1, explanation: "蜂鸟是唯一能倒着飞的鸟类。" },
            { question: "哪种动物的牙齿永远不会掉光？", options: ["大象", "鲨鱼", "河马", "鳄鱼"], correct: 1, explanation: "鲨鱼一生可以更换上万颗牙齿。" }
        ];

        let currentCategory = "all";
        let currentScore = 0;
        let currentQuiz = null;
        let quizHistory = [];

        // 显示随机趣闻
        function showRandomFact() {
            let filteredFacts = factsDatabase;
            if (currentCategory !== "all") {
                filteredFacts = factsDatabase.filter(f => f.category === currentCategory);
            }
            
            if (filteredFacts.length === 0) {
                document.getElementById('factDisplay').textContent = "该分类暂无趣闻，试试其他分类吧！";
                return;
            }
            
            const randomIndex = Math.floor(Math.random() * filteredFacts.length);
            const fact = filteredFacts[randomIndex];
            
            const factDisplay = document.getElementById('factDisplay');
            const factEmoji = document.getElementById('factEmoji');
            
            factDisplay.style.opacity = '0';
            setTimeout(() => {
                factDisplay.textContent = fact.text;
                factEmoji.textContent = fact.emoji;
                factDisplay.style.opacity = '1';
                factDisplay.classList.add('bounce');
                setTimeout(() => factDisplay.classList.remove('bounce'), 500);
            }, 150);
        }

        // 获取不重复的题目
        function getUniqueQuestion() {
            if (quizHistory.length >= quizDatabase.length) {
                quizHistory = [];
            }
            
            let availableIndices = [];
            for (let i = 0; i < quizDatabase.length; i++) {
                if (!quizHistory.includes(i)) {
                    availableIndices.push(i);
                }
            }
            
            if (availableIndices.length === 0) {
                quizHistory = [];
                availableIndices = quizDatabase.map((_, i) => i);
            }
            
            const randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
            quizHistory.push(randomIndex);
            return quizDatabase[randomIndex];
        }

        // 加载新题目
        function loadQuiz() {
            currentQuiz = getUniqueQuestion();
            
            document.getElementById('quizQuestion').textContent = currentQuiz.question;
            const optionsDiv = document.getElementById('quizOptions');
            optionsDiv.innerHTML = '';
            document.getElementById('quizFeedback').innerHTML = '';
            
            currentQuiz.options.forEach((option, idx) => {
                const optBtn = document.createElement('div');
                optBtn.className = 'quiz-option';
                optBtn.textContent = option;
                optBtn.onclick = () => checkAnswer(idx);
                optionsDiv.appendChild(optBtn);
            });
            
            updateQuizProgress();
        }

        // 下一题
        function nextQuiz() {
            const options = document.querySelectorAll('.quiz-option');
            options.forEach(opt => {
                opt.classList.remove('disabled');
                opt.style.pointerEvents = 'auto';
            });
            loadQuiz();
        }

        // 检查答案
        function checkAnswer(selected) {
            if (!currentQuiz) return;
            
            const feedback = document.getElementById('quizFeedback');
            const options = document.querySelectorAll('.quiz-option');
            
            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                opt.classList.add('disabled');
            });
            
            if (selected === currentQuiz.correct) {
                currentScore++;
                document.getElementById('scoreCount').textContent = currentScore;
                feedback.innerHTML = `✅ 正确！ ${currentQuiz.explanation}`;
                feedback.style.background = '#d4edda';
                feedback.style.color = '#155724';
            } else {
                feedback.innerHTML = `❌ 错误！ 正确答案是：${currentQuiz.options[currentQuiz.correct]}。 ${currentQuiz.explanation}`;
                feedback.style.background = '#f8d7da';
                feedback.style.color = '#721c24';
            }
            
            updateQuizProgress();
        }

        // 更新进度显示
        function updateQuizProgress() {
            const progressSpan = document.getElementById('quizProgress');
            if (progressSpan) {
                const answered = quizHistory.length;
                const total = quizDatabase.length;
                progressSpan.textContent = `本轮已出: ${answered} / 总题: ${total}`;
                if (answered === total) {
                    progressSpan.style.background = '#ff6b6b';
                    progressSpan.style.color = 'white';
                } else {
                    progressSpan.style.background = 'rgba(0,0,0,0.1)';
                    progressSpan.style.color = '#333';
                }
            }
        }

        // 重置题库历史
        function resetQuizHistory() {
            quizHistory = [];
            loadQuiz();
            const feedback = document.getElementById('quizFeedback');
            feedback.innerHTML = '🔄 题库已重置，所有题目都可以重新挑战了！';
            feedback.style.background = '#d4edda';
            feedback.style.color = '#155724';
            setTimeout(() => {
                if (feedback.innerHTML === '🔄 题库已重置，所有题目都可以重新挑战了！') {
                    feedback.innerHTML = '';
                }
            }, 2000);
            updateQuizProgress();
        }

        // 重置分数
        function resetScore() {
            currentScore = 0;
            document.getElementById('scoreCount').textContent = currentScore;
            const feedback = document.getElementById('quizFeedback');
            if (feedback) {
                feedback.innerHTML = '⭐ 分数已重置，继续挑战吧！';
                feedback.style.background = '#d4edda';
                feedback.style.color = '#155724';
                setTimeout(() => {
                    if (feedback.innerHTML === '⭐ 分数已重置，继续挑战吧！') {
                        feedback.innerHTML = '';
                    }
                }, 1500);
            }
        }

        // 加载动物图鉴
        function loadGallery() {
            const grid = document.getElementById('animalsGrid');
            grid.innerHTML = '';
            
            animalsGallery.forEach(animal => {
                const card = document.createElement('div');
                card.className = 'animal-card';
                card.onclick = () => alert(`🌟 ${animal.name}\n\n${animal.desc}\n\n✨ 趣闻：${animal.fact}`);
                card.innerHTML = `
                    <div class="animal-icon">${animal.icon}</div>
                    <div class="animal-info">
                        <div class="animal-name">${animal.name}</div>
                        <div class="animal-desc">${animal.desc}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 设置分类筛选按钮
        function setupCategoryFilters() {
            const categories = [
                { id: "all", name: "全部", icon: "🌍" },
                { id: "mammal", name: "哺乳动物", icon: "🐘" },
                { id: "bird", name: "鸟类", icon: "🦜" },
                { id: "reptile", name: "爬行动物", icon: "🐊" },
                { id: "marine", name: "海洋生物", icon: "🐠" },
                { id: "insect", name: "昆虫", icon: "🦋" },
                { id: "amphibian", name: "两栖动物", icon: "🐸" }
            ];
            
            const container = document.getElementById('categoryButtons');
            container.innerHTML = '';
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.innerHTML = `${cat.icon} ${cat.name}`;
                btn.dataset.category = cat.id;
                btn.style.background = cat.id === 'all' ? '#667eea' : '#ddd';
                btn.style.color = cat.id === 'all' ? 'white' : '#333';
                btn.onclick = () => {
                    document.querySelectorAll('.category-btn').forEach(b => {
                        b.style.background = '#ddd';
                        b.style.color = '#333';
                    });
                    btn.style.background = '#667eea';
                    btn.style.color = 'white';
                    currentCategory = cat.id;
                    showRandomFact();
                };
                container.appendChild(btn);
            });
        }

        // 标签页切换
        function switchTab(tabId) {
            document.getElementById('facts-tab').style.display = tabId === 'facts' ? 'block' : 'none';
            document.getElementById('gallery-tab').style.display = tabId === 'gallery' ? 'block' : 'none';
            document.getElementById('quiz-tab').style.display = tabId === 'quiz' ? 'block' : 'none';
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tab === tabId) btn.classList.add('active');
            });
            
            if (tabId === 'gallery') loadGallery();
            if (tabId === 'quiz') {
                if (!currentQuiz) loadQuiz();
            }
        }

        // 初始化统计
        function initStats() {
            document.getElementById('factCount').textContent = factsDatabase.length;
            document.getElementById('quizTotalCount').textContent = quizDatabase.length;
            document.getElementById('scoreCount').textContent = currentScore;
        }

        // 事件绑定
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // 页面加载初始化
        initStats();
        setupCategoryFilters();
        showRandomFact();
        loadQuiz();
    </script>
</body>
</html>
